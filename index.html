<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protect Democracy – Subversion Strategy</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #000C48;
    --cream: #FBF6ED;
    --blue: #324DB6;
    --red: #E4382A;
    --light-blue: #5481F5;
    --lead: #2E2D31;
  }
  body {
    background: var(--cream);
    font-family: 'Inter', sans-serif;
    display: flex; flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 32px 16px 40px;
  }

  .diagram-wrap {
    position: relative;
    width: min(600px, 100%);
  }

  svg.main-svg { width: 100%; overflow: visible; display: block; }
  .anim-el { opacity: 0; }

  /* Tooltip */
  #tt {
    position: absolute;
    background: var(--navy);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    line-height: 1.6;
    padding: 10px 13px;
    border-radius: 5px;
    border-left: 3px solid var(--red);
    width: 200px;
    pointer-events: none;
    opacity: 0;
    transition: opacity .15s;
    z-index: 999;
    box-shadow: 0 4px 16px rgba(0,0,0,.25);
  }
  #tt.show { opacity: 1; }

  /* Invisible hover zones */
  .hz {
    position: absolute;
    cursor: pointer;
    background: transparent;
    border-radius: 6px;
  }

  .replay-btn {
    margin-top: 20px;
    padding: 10px 24px;
    background: var(--navy);
    color: #fff;
    border: none;
    border-radius: 4px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background .2s;
  }
  .replay-btn:hover { background: var(--blue); }
  .caption { margin-top: 18px; font-size: 11px; color: var(--lead); text-align: center; max-width: 480px; line-height: 1.6; opacity: .7; }
</style>
</head>
<body>

<div class="diagram-wrap" id="diagramWrap">

  <!-- Floating tooltip -->
  <div id="tt"></div>

  <!-- Invisible hover zones -->
  <div class="hz" id="hz1" data-tip="1"></div>
  <div class="hz" id="hz2" data-tip="2"></div>
  <div class="hz" id="hz3" data-tip="3"></div>
  <div class="hz" id="hz4" data-tip="4"></div>
  <div class="hz" id="hz5" data-tip="5"></div>

<svg class="main-svg" id="mainSvg" viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#E4382A"/>
    </marker>
  </defs>

  <!-- STEP 1 -->
  <g class="anim-el" id="anim-step1">
    <circle cx="300" cy="370" r="310" fill="none" stroke="#E4382A" stroke-width="1.5" stroke-dasharray="4 4"/>
    <rect x="234" y="50" width="132" height="22" rx="11" fill="#FBF6ED" stroke="#E4382A" stroke-width="1.5"/>
    <text x="300" y="65" text-anchor="middle" font-family="Inter,sans-serif" font-size="9.5" font-weight="700" letter-spacing=".13em" fill="#E4382A">· DECEIVE ·</text>
    <circle cx="300" cy="100" r="15" fill="#E4382A"/>
    <text x="300" y="105" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#fff">1</text>
    <text x="300" y="135" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#000C48">Supercharge</text>
    <text x="300" y="152" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#000C48">conspiracies</text>
  </g>

  <!-- RING BASE -->
  <g class="anim-el" id="anim-ring-base">
    <circle cx="300" cy="370" r="196" fill="none" stroke="#5481F5" stroke-width="1.5" stroke-dasharray="4 4"/>
    <rect x="241" y="162" width="118" height="20" rx="10" fill="#FBF6ED" stroke="#5481F5" stroke-width="1.5"/>
    <text x="300" y="176" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="700" letter-spacing=".13em" fill="#5481F5">· DISRUPT ·</text>
    <path fill-rule="evenodd" fill="#000C48"
      d="M300,370 m-184,0 a184,184 0 1,0 368,0 a184,184 0 1,0 -368,0
         M300,370 m-84,0  a84,84   0 1,1 168,0 a84,84   0 1,1 -168,0"/>
    <line x1="300" y1="454" x2="300" y2="554" stroke="#FBF6ED" stroke-width="7"/>
    <line x1="227.3" y1="328" x2="140.6" y2="278" stroke="#FBF6ED" stroke-width="7"/>
    <line x1="372.7" y1="328" x2="459.4" y2="278" stroke="#FBF6ED" stroke-width="7"/>
    <circle cx="300" cy="370" r="84" fill="#FBF6ED"/>
  </g>

  <!-- TACTIC 2 (top) -->
  <g class="anim-el" id="anim-step2">
    <path fill="#000C48"
      d="M 144.8,271.1 A 184,184 0 0,1 455.2,271.1 L 370.8,324.9 A 84,84 0 0,0 229.2,324.9 Z"/>
    <circle cx="300" cy="215" r="15" fill="#E4382A"/>
    <text x="300" y="220" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#fff">2</text>
    <text x="300" y="248" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#fff">Deploy federal</text>
    <text x="300" y="265" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#fff">power</text>
  </g>

  <!-- TACTIC 3 (left) -->
  <g class="anim-el" id="anim-step3">
    <path fill="#000C48"
      d="M 292.0,553.8 A 184,184 0 0,1 136.8,285.1 L 225.5,331.2 A 84,84 0 0,0 296.3,453.9 Z"/>
    <circle cx="175" cy="405" r="15" fill="#E4382A"/>
    <text x="175" y="410" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#fff">3</text>
    <text x="175" y="438" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#fff">Use</text>
    <text x="175" y="455" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#fff">violence</text>
  </g>

  <!-- TACTIC 4 (right) -->
  <g class="anim-el" id="anim-step4">
    <path fill="#000C48"
      d="M 463.2,285.1 A 184,184 0 0,1 308.0,553.8 L 303.7,453.9 A 84,84 0 0,0 374.5,331.2 Z"/>
    <circle cx="420" cy="405" r="15" fill="#E4382A"/>
    <text x="420" y="410" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#fff">4</text>
    <text x="420" y="438" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#fff">Manipulate</text>
    <text x="420" y="455" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#fff">election rules</text>
  </g>

  <!-- CENTER TEXT + ARROW -->
  <g class="anim-el" id="anim-center-text">
    <text x="300" y="346" text-anchor="middle" font-family="Libre Baskerville,serif" font-size="9.5" font-weight="700" fill="#E4382A" letter-spacing=".03em">TOGETHER, THESE</text>
    <text x="300" y="359" text-anchor="middle" font-family="Libre Baskerville,serif" font-size="9.5" font-weight="700" fill="#E4382A" letter-spacing=".03em">TACTICS UNDERMINE</text>
    <text x="300" y="372" text-anchor="middle" font-family="Libre Baskerville,serif" font-size="9.5" font-weight="700" fill="#E4382A" letter-spacing=".03em">TURNOUT AND</text>
    <text x="300" y="385" text-anchor="middle" font-family="Libre Baskerville,serif" font-size="9.5" font-weight="700" fill="#E4382A" letter-spacing=".03em">RESULTS</text>
    <line x1="268" y1="392" x2="332" y2="392" stroke="#E4382A" stroke-width="0.75" opacity="0.4"/>
    <text x="300" y="405" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="700" fill="#000C48" letter-spacing=".06em">AND IF THAT'S</text>
    <text x="300" y="417" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="700" fill="#000C48" letter-spacing=".06em">NOT ENOUGH...</text>
    <line x1="300" y1="425" x2="300" y2="615" stroke="#E4382A" stroke-width="2" marker-end="url(#arr)"/>
  </g>

  <!-- STEP 5 -->
  <g class="anim-el" id="anim-step5">
    <circle cx="300" cy="700" r="72" fill="none" stroke="#E4382A" stroke-width="1.5" stroke-dasharray="4 4"/>
    <rect x="266" y="616" width="68" height="20" rx="10" fill="#FBF6ED" stroke="#E4382A" stroke-width="1.5"/>
    <text x="300" y="630" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="700" letter-spacing=".13em" fill="#E4382A">· DENY ·</text>
    <circle cx="300" cy="700" r="58" fill="#000C48"/>
    <circle cx="300" cy="673" r="15" fill="#E4382A"/>
    <text x="300" y="678" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#fff">5</text>
    <text x="300" y="711" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#fff">Overturn</text>
    <text x="300" y="728" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#fff">results</text>
  </g>

</svg>
</div>

<button class="replay-btn" id="replayBtn" onclick="runAnimation()">↺ Replay</button>
<p class="caption">The administration holds and entrenches its power, enabling their agenda — whether or not it's what the American people want.</p>

<script>
  const tipText = {
    1: "The administration has made election denialism official federal policy by using investigative and enforcement powers to undermine confidence in elections.",
    2: "The administration has used investigative, prosecutorial, and regulatory power to deter opposition, voter engagement, and faithful public service.",
    3: "The administration has used and threatened violence to quash protests and create conditions for voter intimidation.",
    4: "The administration is pursuing a coordinated effort to seize control over election administration and make it harder for millions of eligible Americans to vote.",
    5: "If the administration can't hold on to power by tilting the electoral playing field or making it harder for Americans to vote, they will contest, delay, or overturn results they don't like."
  };

  const tt   = document.getElementById('tt');
  const wrap = document.getElementById('diagramWrap');

  function svgToPercent(svgX, svgY, svgW, svgH) {
    return { left: (svgX / 600) * 100, top: (svgY / 800) * 100, w: (svgW / 600) * 100, h: (svgH / 800) * 100 };
  }

  const zones = {
    hz1: [215, 82,  170, 85],
    hz2: [205, 197, 190, 82],
    hz3: [100, 385, 150, 85],
    hz4: [345, 385, 150, 85],
    hz5: [235, 655, 130, 90],
  };

  function positionZones() {
    for (const [id, [x, y, w, h]] of Object.entries(zones)) {
      const p = svgToPercent(x, y, w, h);
      const el = document.getElementById(id);
      el.style.left   = p.left + '%';
      el.style.top    = p.top  + '%';
      el.style.width  = p.w    + '%';
      el.style.height = p.h    + '%';
    }
  }

  positionZones();
  window.addEventListener('resize', positionZones);

  document.querySelectorAll('.hz').forEach(hz => {
    hz.addEventListener('mouseenter', () => {
      tt.textContent = tipText[hz.dataset.tip];
      tt.classList.add('show');
    });
    hz.addEventListener('mousemove', e => {
      const r = wrap.getBoundingClientRect();
      let x = e.clientX - r.left + 14;
      let y = e.clientY - r.top  - 10;
      if (x + 214 > r.width) x = e.clientX - r.left - 224;
      if (y + tt.offsetHeight > r.height) y = e.clientY - r.top - tt.offsetHeight - 6;
      tt.style.left = x + 'px';
      tt.style.top  = y + 'px';
    });
    hz.addEventListener('mouseleave', () => tt.classList.remove('show'));
  });

  function fadeIn(el, duration) {
    return new Promise(resolve => {
      el.style.transition = `opacity ${duration}ms ease`;
      el.style.opacity = 1;
      setTimeout(resolve, duration);
    });
  }
  function resetEl(el) { el.style.transition = 'none'; el.style.opacity = 0; }
  const pause = ms => new Promise(r => setTimeout(r, ms));

  async function runAnimation() {
    const ids = ['anim-step1','anim-ring-base','anim-step2','anim-step3','anim-step4','anim-center-text','anim-step5'];
    ids.forEach(id => resetEl(document.getElementById(id)));
    const btn = document.getElementById('replayBtn');
    btn.disabled = true;

    await pause(300);
    await fadeIn(document.getElementById('anim-step1'), 900);
    await pause(600);
    await fadeIn(document.getElementById('anim-ring-base'), 600);
    await pause(100);
    await fadeIn(document.getElementById('anim-step2'), 300);
    await pause(1500);
    await fadeIn(document.getElementById('anim-step3'), 300);
    await pause(1500);
    await fadeIn(document.getElementById('anim-step4'), 300);
    await pause(1500);
    await fadeIn(document.getElementById('anim-center-text'), 700);
    await pause(1900);
    await fadeIn(document.getElementById('anim-step5'), 900);

    btn.disabled = false;
  }

  window.addEventListener('load', () => setTimeout(runAnimation, 400));
</script>
</body>
</html>
